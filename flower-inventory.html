<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhaoyingpei - 鲜花库存管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6B7280;
            --primary-dark: #4B5563;
            --secondary: #9CA3AF;
            --accent: #D1D5DB;
            --bg-main: #F9FAFB;
            --bg-card: #FFFFFF;
            --text-primary: #1F2937;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
            --shadow: rgba(107, 114, 128, 0.15);
            --success: #6FCF97;
            --warning: #F2994A;
            --danger: #EB5757;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #F9FAFB 0%, #F3F4F6 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 20px 20px 30px;
            color: white;
            box-shadow: 0 4px 20px var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '✿';
            position: absolute;
            font-size: 150px;
            right: -30px;
            top: -40px;
            opacity: 0.15;
            transform: rotate(-15deg);
        }

        .header-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .header-subtitle {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 300;
        }

        /* Stats Overview */
        .stats-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: -20px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 12px var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            animation: slideUp 0.5s ease backwards;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card:active {
            transform: scale(0.98);
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 8px;
            display: block;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'Noto Serif SC', serif;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
            font-weight: 400;
        }

        /* Quick Actions */
        .quick-actions {
            padding: 0 20px 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .action-btn {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .action-btn:active {
            transform: scale(0.95);
            box-shadow: 0 1px 4px var(--shadow);
        }

        .action-btn.primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-color: var(--primary);
            color: white;
        }

        .action-icon {
            font-size: 28px;
            margin-bottom: 8px;
            display: block;
        }

        .action-label {
            font-size: 12px;
            font-weight: 500;
        }

        /* Inventory List */
        .inventory-section {
            padding: 0 20px 20px;
        }

        .inventory-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .inventory-item {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            gap: 15px;
            box-shadow: 0 2px 10px var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            animation: slideUp 0.5s ease backwards;
        }

        .inventory-item:nth-child(1) { animation-delay: 0.5s; }
        .inventory-item:nth-child(2) { animation-delay: 0.6s; }
        .inventory-item:nth-child(3) { animation-delay: 0.7s; }

        .inventory-item:active {
            transform: scale(0.98);
        }

        .item-image {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
        }

        .item-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .item-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .item-details {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .item-stock {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stock-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .stock-badge.high {
            background: rgba(111, 207, 151, 0.15);
            color: var(--success);
        }

        .stock-badge.medium {
            background: rgba(242, 153, 74, 0.15);
            color: var(--warning);
        }

        .stock-badge.low {
            background: rgba(235, 87, 87, 0.15);
            color: var(--danger);
        }

        .item-quantity {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 12px 0 8px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 -2px 10px var(--shadow);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 4px 16px;
            border-radius: 12px;
        }

        .nav-item:active {
            transform: scale(0.95);
        }

        .nav-item.active {
            color: var(--primary-dark);
            background: rgba(107, 114, 128, 0.1);
        }

        .nav-icon {
            font-size: 24px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 500;
        }

        /* Alert Badge */
        .alert-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--danger);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 600;
        }

        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(107, 114, 128, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .fab:active {
            transform: scale(0.9);
        }

        /* Search Bar */
        .search-container {
            padding: 15px 20px;
        }

        .search-bar {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .search-icon {
            font-size: 20px;
            color: var(--text-secondary);
        }

        .search-input {
            border: none;
            outline: none;
            background: transparent;
            flex: 1;
            font-size: 14px;
            color: var(--text-primary);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        /* Trend Chart */
        .trend-chart {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 12px var(--shadow);
            border: 1px solid var(--border);
            animation: slideUp 0.5s ease backwards;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .chart-period {
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--bg-main);
            padding: 4px 12px;
            border-radius: 8px;
        }

        .chart-canvas {
            position: relative;
            height: 180px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 8px;
            padding: 10px 0;
        }

        .chart-bar {
            flex: 1;
            background: linear-gradient(to top, var(--primary-dark), var(--primary));
            border-radius: 6px 6px 0 0;
            position: relative;
            transition: all 0.3s ease;
            min-height: 20px;
            animation: growUp 0.8s ease backwards;
        }

        @keyframes growUp {
            from {
                transform: scaleY(0);
                transform-origin: bottom;
            }
            to {
                transform: scaleY(1);
                transform-origin: bottom;
            }
        }

        .chart-bar:nth-child(1) { animation-delay: 0.1s; }
        .chart-bar:nth-child(2) { animation-delay: 0.2s; }
        .chart-bar:nth-child(3) { animation-delay: 0.3s; }
        .chart-bar:nth-child(4) { animation-delay: 0.4s; }
        .chart-bar:nth-child(5) { animation-delay: 0.5s; }
        .chart-bar:nth-child(6) { animation-delay: 0.6s; }
        .chart-bar:nth-child(7) { animation-delay: 0.7s; }

        .chart-bar:hover {
            background: linear-gradient(to top, var(--primary), var(--secondary));
            transform: translateY(-4px);
        }

        .chart-value {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .chart-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .chart-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .legend-dot.primary {
            background: var(--primary);
        }

        .legend-dot.success {
            background: var(--success);
        }

        .legend-dot.warning {
            background: var(--warning);
        }
    
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-title">Zhaoyingpei</div>
        <div class="header-subtitle">今日鲜花管理 · v1.0</div>
    </div>

    <!-- Trend Charts -->
    <div class="stats-container">
        <!-- 本周进货趋势 -->
        <div class="trend-chart" style="grid-column: 1 / -1;">
            <div class="chart-header">
                <div class="chart-title">📈 本周进货趋势</div>
                <div class="chart-period">最近7天</div>
            </div>
            <div class="chart-canvas">
                <div class="chart-bar" style="height: 45%;">
                    <span class="chart-value">28</span>
                    <span class="chart-label">周一</span>
                </div>
                <div class="chart-bar" style="height: 68%;">
                    <span class="chart-value">42</span>
                    <span class="chart-label">周二</span>
                </div>
                <div class="chart-bar" style="height: 85%;">
                    <span class="chart-value">52</span>
                    <span class="chart-label">周三</span>
                </div>
                <div class="chart-bar" style="height: 72%;">
                    <span class="chart-value">45</span>
                    <span class="chart-label">周四</span>
                </div>
                <div class="chart-bar" style="height: 95%;">
                    <span class="chart-value">58</span>
                    <span class="chart-label">周五</span>
                </div>
                <div class="chart-bar" style="height: 58%;">
                    <span class="chart-value">36</span>
                    <span class="chart-label">周六</span>
                </div>
                <div class="chart-bar" style="height: 62%;">
                    <span class="chart-value">38</span>
                    <span class="chart-label">今日</span>
                </div>
            </div>
            <div class="chart-legend">
                <div class="legend-item">
                    <span class="legend-dot primary"></span>
                    <span>进货量（支）</span>
                </div>
            </div>
        </div>

        <!-- 库存状态分布 -->
        <div class="trend-chart" style="grid-column: 1 / -1; margin-top: 15px;">
            <div class="chart-header">
                <div class="chart-title">📊 库存状态分布</div>
                <div class="chart-period">实时数据</div>
            </div>
            <div class="chart-canvas" style="height: 140px;">
                <div class="chart-bar" style="height: 85%; background: linear-gradient(to top, #6FCF97, #52B788);">
                    <span class="chart-value">128</span>
                    <span class="chart-label">库存充足</span>
                </div>
                <div class="chart-bar" style="height: 48%; background: linear-gradient(to top, #F2994A, #F4A261);">
                    <span class="chart-value">68</span>
                    <span class="chart-label">库存适中</span>
                </div>
                <div class="chart-bar" style="height: 25%; background: linear-gradient(to top, #EB5757, #E76F51);">
                    <span class="chart-value">35</span>
                    <span class="chart-label">库存偏低</span>
                </div>
            </div>
            <div class="chart-legend">
                <div class="legend-item">
                    <span class="legend-dot success"></span>
                    <span>充足</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot warning"></span>
                    <span>适中</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background: var(--danger);"></span>
                    <span>偏低</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
        <div class="section-title">
            <span>⚡</span> 快捷操作
        </div>
        <div class="action-grid">
            <div class="action-btn primary" onclick="addInventory()">
                <span class="action-icon">➕</span>
                <div class="action-label">添加进货</div>
            </div>
            <div class="action-btn" onclick="outStock()">
                <span class="action-icon">📤</span>
                <div class="action-label">出库记录</div>
            </div>
            <div class="action-btn" onclick="scanCode()">
                <span class="action-icon">📷</span>
                <div class="action-label">扫码入库</div>
            </div>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="search-container">
        <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" placeholder="搜索鲜花名称、品种...">
        </div>
    </div>

    <!-- Inventory List -->
    <div class="inventory-section">
        <div class="section-title">
            <span>📋</span> 库存列表
        </div>
        <div class="inventory-list">
            <div class="inventory-item" onclick="viewDetail(1)">
                <div class="item-image">🌹</div>
                <div class="item-info">
                    <div class="item-name">红玫瑰</div>
                    <div class="item-details">品种：卡罗拉 · 等级：A级</div>
                    <div class="item-stock">
                        <span class="stock-badge high">库存充足</span>
                        <span class="item-quantity">385支</span>
                    </div>
                </div>
            </div>

            <div class="inventory-item" onclick="viewDetail(2)">
                <div class="item-image">🌷</div>
                <div class="item-info">
                    <div class="item-name">郁金香</div>
                    <div class="item-details">品种：荷兰进口 · 等级：特级</div>
                    <div class="item-stock">
                        <span class="stock-badge medium">库存适中</span>
                        <span class="item-quantity">142支</span>
                    </div>
                </div>
            </div>

            <div class="inventory-item" onclick="viewDetail(3)">
                <div class="item-image">🌻</div>
                <div class="item-info">
                    <div class="item-name">向日葵</div>
                    <div class="item-details">品种：金色阳光 · 等级：A级</div>
                    <div class="item-stock">
                        <span class="stock-badge low">库存偏低</span>
                        <span class="item-quantity">28支</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Action Button -->
    <div class="fab" onclick="quickAdd()">
        <span>⚡</span>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">首页</span>
        </div>
        <div class="nav-item" style="position: relative;">
            <span class="nav-icon">📈</span>
            <span class="nav-label">趋势图</span>
        </div>
        <div class="nav-item" style="position: relative;">
            <span class="nav-icon">🔔</span>
            <span class="nav-label">提醒</span>
            <span class="alert-badge">5</span>
        </div>
        <div class="nav-item">
            <span class="nav-icon">👤</span>
            <span class="nav-label">我的</span>
        </div>
    </div>

    <script>
        // 添加进货
        function addInventory() {
            alert('打开添加进货页面');
        }

        // 出库记录
        function outStock() {
            alert('打开出库记录页面');
        }

        // 扫码入库
        function scanCode() {
            alert('打开扫码功能');
        }

        // 快速添加
        function quickAdd() {
            alert('快速添加鲜花');
        }

        // 查看详情
        function viewDetail(id) {
            alert('查看鲜花详情 ID: ' + id);
        }

        // 底部导航切换
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach((item, index) => {
            item.addEventListener('click', function() {
                navItems.forEach(nav => nav.classList.remove('active'));
                this.classList.add('active');
                
                const labels = ['首页', '趋势图', '提醒', '我的'];
                console.log('切换到: ' + labels[index]);
            });
        });

        // 搜索功能
        const searchInput = document.querySelector('.search-input');
        searchInput.addEventListener('input', function(e) {
            console.log('搜索关键词: ' + e.target.value);
            // 这里可以添加实际的搜索过滤逻辑
        });
    </script>
</body>
</html>
